<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario | Catálogo de Plantas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="controls-section">
          <div class="filter-container">
              <label for="filtroCategoria">Filtrar por Categoría:</label>
              <select id="filtroCategoria">
                  </select>
          </div>

          <div class="summary-container card-dark">
              <h2>Resumen del Inventario</h2>
              <div class="summary-details">
                  <p>Total Plantas: <span id="resumenTotalUnicos">--</span></p>
                  <p>Unidades Totales: <span id="resumenTotalUnidades">--</span></p>
                  <p>Valor Inventario: Rs. <span id="resumenValorTotal">--</span></p>
                  <p>Categorías: <span id="resumenCategorias">--</span></p>
              </div>
          </div>
      </header>

      <main>
          <h1 class="main-title">Our Top Selling</h1>
          <div id="catalogGrid" class="catalog-grid">
              </div>
          
          <div id="validationMessage" class="validation-message hidden"></div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
